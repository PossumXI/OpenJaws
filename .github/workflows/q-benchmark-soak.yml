name: Q Benchmark Soak

on:
  workflow_dispatch:
  schedule:
    - cron: '25 7 * * *'

permissions:
  contents: read

jobs:
  q-soak-dry-run:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build native OpenJaws binary
        run: bun run build:native
      - name: Verify soak utility smoke
        run: bun test src/utils/ociQRuntime.test.ts src/utils/externalProviderProbe.test.ts
      - name: Build audited sample bundle
        run: bun scripts/audit-openjaws-sft.ts --in data/sft/prepared-sample/all.jsonl --out-dir artifacts/ci-q-soak-audited-sample
      - name: Q soak dry run
        run: bun scripts/q-soak-bench.ts --dry-run --out-dir artifacts/ci-q-soak --mode both --duration-minutes 30 --interval-ms 60000 --timeout-ms 120000
      - name: Upload benchmark receipts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: q-benchmark-soak-receipts
          path: |
            artifacts/ci-q-soak-audited-sample
            artifacts/ci-q-soak
