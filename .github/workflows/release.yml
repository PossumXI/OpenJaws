name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-release-guard:
    name: Verify Release Guard
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release candidate
        env:
          CI: true
        run: bun run verify:release

  release-security-guard:
    name: Release Security Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-assets:
    name: Build ${{ matrix.platform }}
    needs:
      - verify-release-guard
      - release-security-guard
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            platform: linux-x64
            binary_path: dist/openjaws
          - runs_on: macos-15-intel
            platform: darwin-x64
            binary_path: dist/openjaws
          - runs_on: windows-latest
            platform: win32-x64
            binary_path: dist/openjaws.exe

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify public release build
        env:
          CI: true
        run: bun run verify:public

      - name: Package release assets
        env:
          OPENJAWS_RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.OPENJAWS_RELEASE_SIGNING_PRIVATE_KEY }}
          OPENJAWS_REQUIRE_RELEASE_SIGNATURE: "1"
        shell: bash
        run: >
          bun run release:asset --
          --binary "${{ matrix.binary_path }}"
          --out-dir release-assets
          --platform "${{ matrix.platform }}"

      - name: Upload packaged assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-assets-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-assets
    permissions:
      contents: write

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          title="OpenJaws ${tag}"
          if [[ "${tag}" == *-* ]]; then
            prerelease=true
          else
            prerelease=false
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "title=${title}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Ensure draft GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          title="${{ steps.meta.outputs.title }}"
          prerelease="${{ steps.meta.outputs.prerelease }}"

          if gh release view "${tag}" --json isDraft >/dev/null 2>&1; then
            is_draft="$(gh release view "${tag}" --json isDraft --jq '.isDraft')"
            if [[ "${is_draft}" != "true" ]]; then
              echo "Refusing to upload assets to non-draft release ${tag}."
              exit 1
            fi
            echo "Draft release ${tag} already exists."
            exit 0
          fi

          args=(release create "${tag}" --title "${title}" --generate-notes --draft)
          if [[ "${prerelease}" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"

      - name: Verify packaged asset set
        shell: bash
        run: |
          expected=(
            "openjaws-linux-x64"
            "openjaws-manifest-linux-x64.json"
            "openjaws-darwin-x64"
            "openjaws-manifest-darwin-x64.json"
            "openjaws-win32-x64.exe"
            "openjaws-manifest-win32-x64.json"
          )
          mapfile -t files < <(find release-assets -maxdepth 1 -type f -printf '%f\n' | sort)
          if [[ "${#files[@]}" -ne "${#expected[@]}" ]]; then
            echo "Unexpected release asset count: ${#files[@]} (expected ${#expected[@]})"
            printf 'Found files:\n%s\n' "${files[*]}"
            exit 1
          fi
          for file in "${files[@]}"; do
            if ! printf '%s\n' "${expected[@]}" | grep -Fxq "${file}"; then
              echo "Unexpected release asset: ${file}"
              exit 1
            fi
          done
          for expected_file in "${expected[@]}"; do
            if ! printf '%s\n' "${files[@]}" | grep -Fxq "${expected_file}"; then
              echo "Missing release asset: ${expected_file}"
              exit 1
            fi
          done

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          mapfile -t files < <(find release-assets -maxdepth 1 -type f | sort)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No release assets found."
            exit 1
          fi
          mapfile -t existing < <(gh release view "${tag}" --json assets --jq '.assets[].name' 2>/dev/null || true)
          for file in "${files[@]}"; do
            name="$(basename "${file}")"
            if printf '%s\n' "${existing[@]}" | grep -Fxq "${name}"; then
              echo "Refusing to overwrite published asset ${name} on ${tag}."
              exit 1
            fi
          done
          gh release upload "${tag}" "${files[@]}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          title="${{ steps.meta.outputs.title }}"
          gh release edit "${tag}" --draft=false --title "${title}"
