name: Security

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    # CodeQL remains blocking on pull requests and manual security runs.
    # Default-branch push analysis can hang in GitHub's upload/analyze phase, so
    # push runs keep the fast leak scanners while PRs carry the CodeQL gate.
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: github/codeql-action/init@d4b3ca9fa7f69d38bfcd667bdc45bc373d16277e # v4
        with:
          languages: javascript-typescript
          config-file: ./.github/codeql/codeql-config.yml
      - uses: github/codeql-action/analyze@d4b3ca9fa7f69d38bfcd667bdc45bc373d16277e # v4

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Run dependency review when repository support is available
        if: vars.OPENJAWS_ENABLE_DEPENDENCY_REVIEW == '1'
        id: dependency_review
        continue-on-error: true
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
      - name: Skip dependency review until repository support is enabled
        if: vars.OPENJAWS_ENABLE_DEPENDENCY_REVIEW != '1'
        run: |
          echo "::notice::Dependency review is disabled until OPENJAWS_ENABLE_DEPENDENCY_REVIEW is set to 1 after Dependency graph/GHAS support is enabled for this repository."
      - name: Record dependency review availability
        if: steps.dependency_review.outcome == 'failure'
        run: |
          echo "::warning::GitHub dependency review is unavailable for this repository. Enable Dependency graph and GitHub Advanced Security for private repositories to make this check blocking again."

  gitguardian:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Skip GitGuardian when not configured
        if: env.GITGUARDIAN_API_KEY == ''
        run: echo "GITGUARDIAN_API_KEY is not configured; skipping GitGuardian scan."
      - name: Run GitGuardian
        if: env.GITGUARDIAN_API_KEY != ''
        uses: GitGuardian/ggshield-action@6c09563e49c9613c0c3c186d59fb1527ce1b50b0 # v1
        env:
          GITGUARDIAN_API_KEY: ${{ env.GITGUARDIAN_API_KEY }}
