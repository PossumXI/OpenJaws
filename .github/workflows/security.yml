name: Security

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: github/codeql-action/init@d4b3ca9fa7f69d38bfcd667bdc45bc373d16277e # v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@d4b3ca9fa7f69d38bfcd667bdc45bc373d16277e # v4

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Run dependency review when repository support is available
        id: dependency_review
        continue-on-error: true
        uses: actions/dependency-review-action@595b5aeba73380359d98a5e087f648dbb0edce1b # v4.7.3
      - name: Record dependency review availability
        if: steps.dependency_review.outcome == 'failure'
        run: |
          echo "::warning::GitHub dependency review is unavailable for this repository. Enable Dependency graph and GitHub Advanced Security for private repositories to make this check blocking again."

  gitguardian:
    runs-on: ubuntu-latest
    env:
      GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Skip GitGuardian when not configured
        if: env.GITGUARDIAN_API_KEY == ''
        run: echo "GITGUARDIAN_API_KEY is not configured; skipping GitGuardian scan."
      - name: Run GitGuardian
        if: env.GITGUARDIAN_API_KEY != ''
        uses: GitGuardian/ggshield-action@6c09563e49c9613c0c3c186d59fb1527ce1b50b0 # v1
        env:
          GITGUARDIAN_API_KEY: ${{ env.GITGUARDIAN_API_KEY }}
