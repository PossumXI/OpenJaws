name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test-build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Audit dead files and unresolved imports
        run: bun run audit:knip
      - name: Enforce scripts coverage floor
        run: bun run test:coverage:scripts
      - name: Verify PR build
        run: bun run verify:ci
