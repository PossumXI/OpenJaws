name: JAWS Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "jaws-v*"

permissions:
  contents: write

concurrency:
  group: jaws-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-desktop:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: windows-latest
            platform: windows-x64
          - runs_on: ubuntu-latest
            platform: linux-x64
          - runs_on: macos-15-intel
            platform: darwin-x64

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file
          sudo apt-get install -y --no-install-recommends libfuse2 || \
            sudo apt-get install -y --no-install-recommends libfuse2t64

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install root dependencies
        run: bun scripts/ci-bun-install.ts --frozen-lockfile

      - name: Install desktop dependencies
        run: bun scripts/ci-bun-install.ts --cwd apps/jaws-desktop --frozen-lockfile

      - name: Install website dependencies
        if: runner.os == 'Windows'
        run: bun scripts/ci-bun-install.ts --cwd website --frozen-lockfile

      - name: Verify public OpenJaws build
        if: runner.os == 'Windows'
        env:
          CI: true
        run: bun run verify:public

      - name: Build platform OpenJaws sidecar
        if: runner.os != 'Windows'
        run: bun run build:native

      - name: Verify JAWS desktop build
        env:
          CI: true
        run: bun run jaws:verify

      - name: Verify updater signing inputs
        shell: bash
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required for signed desktop update artifacts."
            exit 1
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.JAWS_TAURI_SIGNING_PRIVATE_KEY }}

      - name: Verify release config
        env:
          JAWS_TAURI_UPDATER_PUBLIC_KEY: ${{ vars.JAWS_TAURI_UPDATER_PUBLIC_KEY || secrets.JAWS_TAURI_UPDATER_PUBLIC_KEY }}
        run: bun run jaws:release:check

      - name: Verify updater manifest generator
        run: bun run jaws:manifest:test

      - name: Build Linux desktop bundle
        if: runner.os == 'Linux'
        working-directory: apps/jaws-desktop
        env:
          CI: true
          JAWS_TAURI_UPDATER_PUBLIC_KEY: ${{ vars.JAWS_TAURI_UPDATER_PUBLIC_KEY || secrets.JAWS_TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.JAWS_TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.JAWS_TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          node scripts/verify-release-config.mjs --require-signing-key
          bun run prepare:sidecar
          bun run tauri build --bundles deb rpm

      - name: Build desktop bundle
        if: runner.os != 'Linux'
        working-directory: apps/jaws-desktop
        env:
          CI: true
          JAWS_TAURI_UPDATER_PUBLIC_KEY: ${{ vars.JAWS_TAURI_UPDATER_PUBLIC_KEY || secrets.JAWS_TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.JAWS_TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.JAWS_TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri:build

      - name: Upload desktop bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jaws-desktop-${{ matrix.platform }}
          path: apps/jaws-desktop/src-tauri/target/release/bundle/**
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish tagged release artifacts
    if: startsWith(github.ref, 'refs/tags/jaws-v')
    needs: build-desktop
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Download desktop bundles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: jaws-desktop-artifacts

      - name: Verify tagged desktop version
        shell: bash
        run: |
          version="$(node -p "require('./apps/jaws-desktop/package.json').version")"
          expected="${TAG_NAME#jaws-v}"
          if [[ "$version" != "$expected" ]]; then
            echo "Desktop package version ${version} does not match tag ${TAG_NAME}."
            exit 1
          fi
          node apps/jaws-desktop/scripts/build-release-index.mjs --check
        env:
          TAG_NAME: ${{ github.ref_name }}

      - name: Generate updater manifest
        shell: bash
        run: |
          version="${TAG_NAME#jaws-v}"
          node apps/jaws-desktop/scripts/build-updater-manifest.mjs \
            --bundle-root jaws-desktop-artifacts \
            --base-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}" \
            --out jaws-desktop-artifacts/latest.json \
            --version "${version}" \
            --notes "Signed JAWS Desktop update."
        env:
          TAG_NAME: ${{ github.ref_name }}

      - name: Verify release artifact set
        run: bun scripts/jaws-release-artifact-guard.ts --bundle-root jaws-desktop-artifacts --json

      - name: Publish draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          release_is_draft="$(gh release view "$TAG_NAME" --json isDraft --jq '.isDraft' 2>/dev/null || true)"
          if [[ -z "$release_is_draft" ]]; then
            gh release create "$TAG_NAME" --draft --title "JAWS ${TAG_NAME}" --notes "Signed JAWS Desktop installer and updater artifacts."
            release_is_draft="true"
          fi
          mapfile -t files < <(
            find jaws-desktop-artifacts -type f \( \
              -name 'latest.json' -o \
              -name '*.app.tar.gz' -o \
              -name '*.dmg' -o \
              -name '*.deb' -o \
              -name '*.rpm' -o \
              -name '*.msi' -o \
              -name '*.exe' -o \
              -name '*.sig' \
            \) | sort
          )
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No JAWS Desktop artifacts found."
            exit 1
          fi
          if [[ "$release_is_draft" != "true" ]]; then
            mapfile -t existing < <(gh release view "$TAG_NAME" --json assets --jq '.assets[].name' 2>/dev/null || true)
            for file in "${files[@]}"; do
              name="$(basename "$file")"
              if printf '%s\n' "${existing[@]}" | grep -Fxq "$name"; then
                echo "Refusing to overwrite published asset $name on $TAG_NAME."
                exit 1
              fi
            done
            gh release upload "$TAG_NAME" "${files[@]}"
          else
            gh release upload "$TAG_NAME" --clobber "${files[@]}"
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release edit "$TAG_NAME" --draft=false --title "JAWS ${TAG_NAME}"
